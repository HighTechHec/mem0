name: JAX-PRIME Zero-Cost Swarm Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run a nightly sweep at 03:00 UTC (zero cost compute)
    - cron: '0 3 * * *'

jobs:
  swarm_verification:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
        
    - name: Run Swarm Logic Tests (CPU Bound)
      run: |
        pytest tests/ -v
        
    - name: Synthetic Router Validation
      run: |
        python core/elastic_router.py --dry-run
        
    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      with:
        name: swarm-test-report
        path: .pytest_cache/v/cache/stepwise
