name: JAX-PRIME Zero-Cost Swarm Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * *'

jobs:
  swarm_verification:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-asyncio

    - name: Run Swarm Logic Tests (CPU Bound)
      run: |
        if [ -d tests ]; then pytest tests/ -v; else echo "No tests dir — skipping"; fi

    - name: Synthetic Router Validation
      run: |
        if [ -f core/elastic_router.py ]; then
          python core/elastic_router.py --dry-run
        else
          echo "No elastic_router — skipping"
        fi

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: swarm-test-report
        path: .pytest_cache/v/cache/stepwise
        if-no-files-found: ignore
